<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쩡난감 - Classic Edition (iOS Patch)</title>
<style>
  :root {
    --mac-bg: #c0c0c0;
    --mac-border-light: #ffffff;
    --mac-border-dark: #808080;
    --mac-border-darker: #404040;
    --aqua-blue: #3875d7;
    --aqua-red: #ff3b30;
  }

  body {
    background-color: #556677;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Charcoal", "Geneva", "Apple SD Gothic Neo", sans-serif;
    user-select: none; /* 아이폰에서 텍스트 선택되는 거 방지 */
    -webkit-user-select: none;
  }

  .window {
    width: 380px;
    background-color: var(--mac-bg);
    border: 2px solid var(--mac-border-light);
    box-shadow: 2px 2px 0px var(--mac-border-dark), 4px 4px 0px var(--mac-border-darker);
    padding: 2px;
  }

  .title-bar {
    background: linear-gradient(to bottom, #eeeeee, #aaaaaa);
    height: 24px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    border-bottom: 1px solid var(--mac-border-dark);
  }

  .close-box {
    width: 13px;
    height: 13px;
    border: 1px solid #444;
    background: radial-gradient(circle at 30% 30%, #fff, #ddd);
    box-shadow: 1px 1px 1px rgba(0,0,0,0.2);
  }

  .title-bar-text {
    flex-grow: 1;
    text-align: center;
    font-weight: bold;
    font-size: 13px;
    color: #333;
    text-shadow: 1px 1px 0px white;
  }

  .menu-bar {
    display: flex;
    padding: 3px 12px;
    font-size: 11px;
    border-bottom: 1px solid var(--mac-border-dark);
    gap: 15px;
    background: white;
  }

  .content {
    padding: 20px;
    background-color: #ebebeb;
    border-top: 1px solid white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 25px;
  }

  .pad {
    aspect-ratio: 1;
    background: radial-gradient(circle at 30% 30%, #fefefe, #b0b0b0);
    border: 1px solid var(--mac-border-darker);
    border-radius: 12px;
    box-shadow: inset 1px 1px 2px white, 2px 2px 5px rgba(0,0,0,0.3);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 11px;
    font-weight: bold;
    color: #444;
    text-align: center;
    transition: all 0.1s;
    touch-action: manipulation; /* 아이폰 더블탭 확대 방지 */
  }

  .pad:active {
    transform: translateY(2px);
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.4);
  }

  .pad.recording {
    background: radial-gradient(circle at 30% 30%, #ff7b70, var(--aqua-red));
    color: white;
    box-shadow: 0 0 15px var(--aqua-red);
    border-color: #900;
  }

  .pad.recorded {
    background: radial-gradient(circle at 30% 30%, #7db9e8, var(--aqua-blue));
    color: white;
    border-color: #1a4a91;
  }

  .footer-ui {
    border: 1px solid var(--mac-border-dark);
    background: #d4d4d4;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-radius: 4px;
  }

  .time-code {
    background: #000;
    color: #00ff00;
    font-family: 'Courier New', monospace;
    padding: 8px;
    text-align: center;
    font-size: 20px;
    border: 2px inset var(--mac-border-dark);
  }

  .slider-container {
    height: 10px;
    background: #888;
    border: 1px solid #444;
    position: relative;
    margin: 5px 0;
  }

  .slider-thumb {
    width: 14px;
    height: 18px;
    background: #eee;
    border: 1px solid #222;
    position: absolute;
    top: -5px;
    left: 20%;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="close-box"></div>
    <div class="title-bar-text">쩡난감 v1.1 (iOS Patch)</div>
  </div>
  <div class="menu-bar">
    <span>File</span><span>Edit</span><span>Sound</span><span>Help</span>
  </div>
  <div class="content">
    <div class="grid" id="board"></div>
    <div class="footer-ui">
      <div class="time-code" id="timer">00:00:00</div>
      <div class="slider-container">
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const board = document.getElementById('board');
  const timerDisplay = document.getElementById('timer');
  let globalTimer;
  let seconds = 0;

  function updateTimer() {
    seconds++;
    const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const secs = String(seconds % 60).padStart(2, '0');
    timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
  }

  for (let i = 0; i < 6; i++) {
    const pad = document.createElement('div');
    pad.className = 'pad';
    pad.innerText = 'EMPTY';
    pad.dataset.state = 'empty';
    
    let mediaRecorder;
    let audioChunks = [];
    let audio = null;
    let pressTimer;
    let isLongPress = false;

    const startRecording = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // 아이폰 사파리를 위한 포맷 자동 감지
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
          // 브라우저가 뱉어낸 마임타입 그대로 사용
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/mp4' });
          audio = new Audio(URL.createObjectURL(blob));
          pad.dataset.state = 'recorded';
          pad.classList.remove('recording');
          pad.classList.add('recorded');
          pad.innerText = 'READY';
          clearInterval(globalTimer);
          seconds = 0;
          timerDisplay.innerText = "00:00:00";
          stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start();
        pad.dataset.state = 'recording';
        pad.classList.add('recording');
        pad.innerText = 'REC...';
        globalTimer = setInterval(updateTimer, 1000);
      } catch (err) { 
        alert(`야 쩡아! 오류 났다: ${err.message}. 아이폰 설정 -> 사파리 가서 마이크 권한 켜져 있는지 확인해!`); 
      }
    };

    const handleInteraction = (e) => {
      if (pad.dataset.state === 'empty') {
        startRecording();
      } else if (pad.dataset.state === 'recording') {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
      } else if (pad.dataset.state === 'recorded') {
        if (audio) { 
          audio.currentTime = 0; 
          audio.play(); 
        }
      }
    };

    // 아이폰 터치 충돌 방지를 위해 이벤트 리스너 정리
    pad.addEventListener('touchstart', (e) => {
      e.preventDefault(); // 화면 스크롤, 줌 방지
      isLongPress = false;
      if (pad.dataset.state === 'recorded') {
        pressTimer = setTimeout(() => {
          isLongPress = true;
          startRecording();
        }, 800);
      }
    }, { passive: false });

    pad.addEventListener('touchend', (e) => {
      e.preventDefault();
      clearTimeout(pressTimer);
      if (!isLongPress) handleInteraction(e);
    });
    
    // PC 호환성 유지
    pad.addEventListener('mousedown', (e) => {
      isLongPress = false;
      if (pad.dataset.state === 'recorded') {
        pressTimer = setTimeout(() => {
          isLongPress = true;
          startRecording();
        }, 800);
      }
    });

    pad.addEventListener('mouseup', (e) => {
      clearTimeout(pressTimer);
      if (!isLongPress) handleInteraction(e);
    });

    board.appendChild(pad);
  }
</script>
</body>
</html>
