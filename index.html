<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쩡난감 v3.2 (Design Overhaul)</title>
<style>
  :root {
    --mac-bg: #c0c0c0;
    --mac-border-light: #ffffff;
    --mac-border-dark: #808080;
    --mac-border-darker: #404040;
    --aqua-blue: #3875d7;
    --aqua-red: #ff3b30;
  }

  body {
    background-color: #556677;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Charcoal", "Geneva", "Apple SD Gothic Neo", sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .window {
    width: 380px;
    background-color: var(--mac-bg);
    border: 2px solid var(--mac-border-light);
    box-shadow: 2px 2px 0px var(--mac-border-dark), 4px 4px 0px var(--mac-border-darker);
    padding: 2px;
  }

  .title-bar {
    background: linear-gradient(to bottom, #eeeeee, #aaaaaa);
    height: 24px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    border-bottom: 1px solid var(--mac-border-dark);
  }

  .close-box {
    width: 13px;
    height: 13px;
    border: 1px solid #444;
    background: radial-gradient(circle at 30% 30%, #fff, #ddd);
    box-shadow: 1px 1px 1px rgba(0,0,0,0.2);
  }

  .title-bar-text {
    flex-grow: 1;
    text-align: center;
    font-weight: bold;
    font-size: 13px;
    color: #333;
    text-shadow: 1px 1px 0px white;
  }

  .menu-bar {
    display: flex;
    padding: 3px 12px;
    font-size: 11px;
    border-bottom: 1px solid var(--mac-border-dark);
    gap: 15px;
    background: white;
  }

  .content {
    padding: 20px;
    background-color: #ebebeb;
    border-top: 1px solid white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  .pad {
    aspect-ratio: 1;
    background: radial-gradient(circle at 30% 30%, #fefefe, #b0b0b0);
    border: 1px solid var(--mac-border-darker);
    border-radius: 12px;
    box-shadow: inset 1px 1px 2px white, 2px 2px 5px rgba(0,0,0,0.3);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 11px;
    font-weight: bold;
    color: #444;
    text-align: center;
    transition: all 0.05s;
    touch-action: manipulation;
  }

  .pad:active {
    transform: translateY(2px);
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.4);
  }

  .pad.recording {
    background: radial-gradient(circle at 30% 30%, #ff7b70, var(--aqua-red));
    color: white;
    box-shadow: 0 0 15px var(--aqua-red);
    border-color: #900;
  }

  .pad.recorded {
    background: radial-gradient(circle at 30% 30%, #7db9e8, var(--aqua-blue));
    color: white;
    border-color: #1a4a91;
  }

  /* 하단 UI 디자인 대대적 수정 (Aqua 스타일) */
  .footer-ui {
    background: linear-gradient(to bottom, #e8e8e8, #d0d0d0);
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    border-radius: 10px;
    border: 1px solid #aaa;
    box-shadow: inset 1px 1px 3px rgba(255,255,255,0.8), 2px 2px 4px rgba(0,0,0,0.1);
  }

  .time-code {
    background: #111;
    color: #33ff33;
    font-family: 'Courier New', monospace;
    padding: 8px;
    text-align: center;
    font-size: 24px;
    border-radius: 6px;
    border: 2px solid #555;
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.6);
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
  }

  .slider-label {
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    color: #555;
    text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
    margin-bottom: -5px;
  }

  /* 젤리(Aqua) 느낌의 슬라이더 궤도 */
  input[type=range].mac-slider {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
  }
  
  input[type=range].mac-slider::-webkit-slider-runnable-track {
    height: 8px;
    background: #999;
    border-radius: 4px;
    box-shadow: inset 1px 1px 3px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.9);
    border: 1px solid #777;
  }

  /* 젤리(Aqua) 느낌의 슬라이더 손잡이 */
  input[type=range].mac-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 22px;
    width: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #7db9e8, var(--aqua-blue));
    border: 1px solid #1a4a91;
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.6), 1px 2px 4px rgba(0,0,0,0.5);
    margin-top: -8px; /* 궤도 중앙에 맞추기 */
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="close-box"></div>
    <div class="title-bar-text">쩡난감 v3.2 (Design Overhaul)</div>
  </div>
  <div class="menu-bar">
    <span>File</span><span>Edit</span><span>Sound</span><span>Help</span>
  </div>
  <div class="content">
    <div class="grid" id="board"></div>
    <div class="footer-ui">
      <div class="time-code" id="timer">00:00:00</div>
      <div class="slider-label">괴물 목소리 ◀ [ 피치 조절 ] ▶ 헬륨 다람쥐</div>
      <input type="range" id="pitch-slider" class="mac-slider" min="0.5" max="2.0" step="0.1" value="1.0">
    </div>
  </div>
</div>

<script>
  const board = document.getElementById('board');
  const timerDisplay = document.getElementById('timer');
  const pitchSlider = document.getElementById('pitch-slider');
  let globalTimer;
  let seconds = 0;

  let audioCtx = null;

  function initAudioEngine() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function updateTimer() {
    seconds++;
    const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const secs = String(seconds % 60).padStart(2, '0');
    timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
  }

  for (let i = 0; i < 6; i++) {
    const pad = document.createElement('div');
    pad.className = 'pad';
    pad.innerText = 'EMPTY';
    pad.dataset.state = 'empty';
    
    let mediaRecorder;
    let audioChunks = [];
    
    let decodedAudioBuffer = null;
    let voiceStartOffset = 0; 
    let pressTimer;
    let isLongPress = false;

    const startRecording = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/mp4' });
          
          try {
            const arrayBuffer = await blob.arrayBuffer();
            decodedAudioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const channelData = decodedAudioBuffer.getChannelData(0);
            const threshold = 0.01; 
            let startSample = 0;
            
            for (let j = 0; j < channelData.length; j++) {
              if (Math.abs(channelData[j]) > threshold) {
                startSample = j;
                break;
              }
            }
            
            const padding = Math.floor(decodedAudioBuffer.sampleRate * 0.05);
            startSample = Math.max(0, startSample - padding);
            
            voiceStartOffset = startSample / decodedAudioBuffer.sampleRate;

          } catch (decodeErr) {
            alert("디코딩 에러 났다! 다시 녹음해줘 쩡아 ㅠㅠ");
          }

          pad.dataset.state = 'recorded';
          pad.classList.remove('recording');
          pad.classList.add('recorded');
          pad.innerText = 'READY';
          clearInterval(globalTimer);
          seconds = 0;
          timerDisplay.innerText = "00:00:00";
          stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start();
        pad.dataset.state = 'recording';
        pad.classList.add('recording');
        pad.innerText = 'REC...';
        globalTimer = setInterval(updateTimer, 1000);
      } catch (err) { 
        alert(`마이크 켜라! 에러: ${err.message}`); 
      }
    };

    const handleInteraction = (e) => {
      initAudioEngine(); 

      if (pad.dataset.state === 'empty') {
        startRecording();
      } else if (pad.dataset.state === 'recording') {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
      } else if (pad.dataset.state === 'recorded') {
        if (decodedAudioBuffer) { 
          const source = audioCtx.createBufferSource();
          source.buffer = decodedAudioBuffer;
          source.playbackRate.value = parseFloat(pitchSlider.value);
          source.connect(audioCtx.destination);
          
          source.start(0, voiceStartOffset); 
        }
      }
    };

    pad.addEventListener('touchstart', (e) => {
      if (e.target !== pitchSlider) e.preventDefault(); 
      initAudioEngine(); 
      isLongPress = false;
      if (pad.dataset.state === 'recorded') {
        pressTimer = setTimeout(() => {
          isLongPress = true;
          startRecording();
        }, 800);
      }
    }, { passive: false });

    pad.addEventListener('touchend', (e) => {
      if (e.target !== pitchSlider) e.preventDefault();
      clearTimeout(pressTimer);
      if (!isLongPress && e.target !== pitchSlider) handleInteraction(e);
    });
    
    pad.addEventListener('mousedown', (e) => {
      initAudioEngine(); 
      isLongPress = false;
      if (pad.dataset.state === 'recorded') {
        pressTimer = setTimeout(() => {
          isLongPress = true;
          startRecording();
        }, 800);
      }
    });

    pad.addEventListener('mouseup', (e) => {
      clearTimeout(pressTimer);
      if (!isLongPress) handleInteraction(e);
    });

    board.appendChild(pad);
  }
</script>
</body>
</html>
